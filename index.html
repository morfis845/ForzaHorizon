<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forza Horizon 6 - Slot Wheelspin & Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    
    <div class="contenedor">
        <h1 class="titulo">SUPER WHEELSPIN</h1>
        
        <div class="filtros-seccion">
            <div class="grupo-filtro">
                <div class="cabecera-filtro">
                    <h3>Países</h3>
                    <div class="botones-grupo">
                        <button class="btn-mini" id="btn-activar-pais">🔄 Todo</button>
                        <button class="btn-mini btn-mini-off" id="btn-desactivar-pais">❌ Nada</button>
                    </div>
                </div>
                <div id="filtro-pais" class="tags-contenedor"></div>
            </div>
            
            <div class="grupo-filtro">
                <div class="cabecera-filtro">
                    <h3>Tipos</h3>
                    <div class="botones-grupo">
                        <button class="btn-mini" id="btn-activar-tipo">🔄 Todo</button>
                        <button class="btn-mini btn-mini-off" id="btn-desactivar-tipo">❌ Nada</button>
                    </div>
                </div>
                <div id="filtro-tipo" class="tags-contenedor"></div>
            </div>

            <div class="grupo-filtro">
                <div class="cabecera-filtro">
                    <h3>Clases</h3>
                    <div class="botones-grupo">
                        <button class="btn-mini" id="btn-activar-clase">🔄 Todo</button>
                        <button class="btn-mini btn-mini-off" id="btn-desactivar-clase">❌ Nada</button>
                    </div>
                </div>
                <div id="filtro-clase" class="tags-contenedor"></div>
            </div>
        </div>
        
        <p id="contador-autos">Cargando garaje...</p>

        <div class="slot-container">
            <div class="marcador-linea"></div>
            <div class="rodillo" id="rodillo"></div>
        </div>

        <div class="linea-acciones">
            <button id="btn-grid-girar">GIRAR</button>
            <button id="btn-exportar" class="btn-secundario">📥 Descargar Excel</button>
            <button id="btn-limpiar" class="btn-peligro">🗑️ Limpiar Datos</button>
        </div>

        <h2 id="resultado"></h2>

        <div style="clear: both; width: 100%;"></div>

        <div class="leaderboard-seccion">
            <div class="cabecera-tabla">
                <h2>🏆 LEADERBOARD LIVE PRO</h2>
                <span id="total-registros">0 autos grabados</span>
            </div>
            
            <div class="tabla-scroll">
                <table id="tabla-leaderboard">
  <thead>
    <tr>
      <th onclick="ordenarLeaderboard('ID')">ID</th>
      <th onclick="ordenarLeaderboard('MARCA')">MARCA</th>
      <th onclick="ordenarLeaderboard('MODELO')">MODELO</th>
      <th onclick="ordenarLeaderboard('TIPO / CATEGORÍA')">TIPO / CATEGORÍA</th>
      <th onclick="ordenarLeaderboard('PAÍS')">PAÍS</th>
      <th onclick="ordenarLeaderboard('TRACCION')">TRACCION</th>
      <th onclick="ordenarLeaderboard('PI')">PI</th>
      <th onclick="ordenarLeaderboard('TIEMPO')">TIEMPO</th>
      <th onclick="ordenarLeaderboard('CLASE')">CLASE</th>
    </tr>
  </thead>
  <tbody id="cuerpo-tabla">
    </tbody>
</table>
            </div>
        </div>

    <div id="modal-tiempos" class="modal-overlay">
  <div class="modal-content">
    <h3 id="modal-titulo-auto">MARCA - MODELO</h3>
    <p class="modal-sub">Registrar tiempos y telemetría de la prueba</p>

    <form id="form-tiempos">
      <div class="form-grid">
        <div class="form-group">
          <label>Categoría / Tipo de Auto</label>
          <input type="text" id="input-tipo" placeholder="Ej: Retro Sports Cars" required />
        </div>
        
        <div class="form-group">
          <label>País de Origen</label>
          <input type="text" id="input-pais" placeholder="Ej: Japón" required />
        </div>

        <div class="form-group">
          <label>Tracción</label>
          <input type="text" id="input-traccion" placeholder="Ej: AWD, RWD, FWD" required />
        </div>
      </div>

      <div class="fase-bloque f2">
        <h4>Telemetría de la Carrera</h4>
        <div class="form-inline">
          <label>
            <span style="font-size:11px; color:#00ccff; margin-bottom:4px; font-weight:bold;">PI</span>
            <input type="number" id="race-pi" placeholder="Ej: 755" required />
          </label>
          <label>
            <span style="font-size:11px; color:#00ccff; margin-bottom:4px; font-weight:bold;">TIEMPO</span>
            <input type="text" id="race-tiempo" placeholder="01:27.786" required />
          </label>
          <label>
            <span style="font-size:11px; color:#00ccff; margin-bottom:4px; font-weight:bold;">CLASE</span>
            <input type="text" id="race-clase" placeholder="Ej: S1" required />
          </label>
        </div>
      </div>

      <div class="modal-botones">
        <button type="button" id="btn-modal-cancelar" class="btn-cancelar">Descartar</button>
        <button type="submit" class="btn-guardar">Guardar Datos</button>
      </div>
    </form>
  </div>
</div>

    <script src="app.js"></script>
</body>
</html>
